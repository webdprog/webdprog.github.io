name: Deploy Dashboard
on:
  push:
    branches: [ main ]

# Added to resolve the Node 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4 # v4 supports Node 24 internally

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Upgraded from 20

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Deploy to GH Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
